<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<meta name="theme-color" content="#0A0E1A"/>
<link rel="manifest" href="../manifest.json"/>
<title>Team Login — Proreinigung</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:linear-gradient(135deg,#0A0E1A 0%,#0D1B3E 50%,#0A2A3A 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;position:relative;overflow:hidden}
body::before{content:'';position:fixed;width:600px;height:600px;border-radius:50%;background:radial-gradient(circle,rgba(0,188,212,.08) 0%,transparent 70%);top:-200px;right:-200px;pointer-events:none}
body::after{content:'';position:fixed;width:400px;height:400px;border-radius:50%;background:radial-gradient(circle,rgba(21,101,192,.1) 0%,transparent 70%);bottom:-100px;left:-100px;pointer-events:none}

.login-card{background:rgba(255,255,255,.97);border-radius:24px;padding:44px 40px;width:100%;max-width:420px;box-shadow:0 40px 100px rgba(0,0,0,.45);position:relative;z-index:1}
@media(max-width:480px){.login-card{padding:32px 24px}}

.login-brand{text-align:center;margin-bottom:32px}
.login-logo-wrap{width:72px;height:72px;border-radius:20px;background:linear-gradient(135deg,#0A0E1A,#1565C0);display:flex;align-items:center;justify-content:center;margin:0 auto 16px;box-shadow:0 8px 24px rgba(21,101,192,.3)}
.login-logo-wrap i{font-size:1.8rem;color:#00BCD4}
.login-brand-name{font-size:1.5rem;font-weight:800;color:#0A0E1A;letter-spacing:-.02em}
.login-portal-badge{display:inline-block;background:#EFF6FF;color:#1565C0;font-size:.68rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;padding:4px 12px;border-radius:999px;margin-top:8px}

h1{font-size:1.35rem;font-weight:800;color:#0A0E1A;text-align:center;margin-bottom:6px}
.login-sub{font-size:.85rem;color:#6b7280;text-align:center;margin-bottom:28px}

.form-group{margin-bottom:16px}
.form-label{display:block;font-size:.78rem;font-weight:700;color:#374151;margin-bottom:6px}
.input-wrap{position:relative}
.input-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:#9ca3af;font-size:.85rem;pointer-events:none}
.form-input{width:100%;padding:11px 14px 11px 40px;border:1.5px solid #E5E7EB;border-radius:12px;font-size:.9rem;color:#111827;background:#fff;outline:none;transition:.2s;font-family:inherit}
.form-input:focus{border-color:#1565C0;box-shadow:0 0 0 3px rgba(21,101,192,.1)}
.pw-toggle{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#9ca3af;font-size:.9rem;padding:4px}
.pw-toggle:hover{color:#1565C0}

.login-error{background:#FEF2F2;color:#DC2626;border:1px solid #FECACA;border-radius:10px;padding:10px 14px;font-size:.83rem;font-weight:500;text-align:center;display:none;margin-bottom:14px}
.login-error.show{display:block}

.login-btn{width:100%;padding:13px;border:none;border-radius:12px;background:linear-gradient(135deg,#1565C0,#00BCD4);color:#fff;font-size:.95rem;font-weight:800;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:.2s;margin-top:4px}
.login-btn:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 6px 20px rgba(21,101,192,.35)}
.login-btn:disabled{opacity:.6;cursor:not-allowed;transform:none}

.login-footer{text-align:center;margin-top:24px;font-size:.8rem;color:#9ca3af}
.login-footer a{color:#1565C0;text-decoration:none;font-weight:600}
.login-footer a:hover{text-decoration:underline}

/* Toast */
.toast-container{position:fixed;bottom:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:8px}
.toast{background:#0A0E1A;color:#fff;padding:12px 18px;border-radius:12px;font-size:.84rem;font-weight:600;display:flex;align-items:center;gap:10px;box-shadow:0 8px 24px rgba(0,0,0,.3);animation:toastIn .3s ease}
@keyframes toastIn{from{transform:translateX(120%);opacity:0}to{transform:translateX(0);opacity:1}}
.toast.success{border-left:4px solid #22c55e}
.toast.error{border-left:4px solid #EF4444}
</style>
</head>
<body>

<div class="login-card">
  <div class="login-brand">
    <div class="login-logo-wrap"><i class="fa-solid fa-broom"></i></div>
    <div class="login-brand-name">Proreinigung</div>
    <div class="login-portal-badge">Team Portal</div>
  </div>

  <h1>Anmelden</h1>
  <p class="login-sub">Für Mitarbeiter und Administratoren</p>

  <form id="login-form" novalidate>
    <div class="form-group">
      <label class="form-label">E-Mail</label>
      <div class="input-wrap">
        <i class="fa-solid fa-envelope input-icon"></i>
        <input type="email" id="tl-email" class="form-input" placeholder="team@proreinigung.de" required autocomplete="email">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Passwort</label>
      <div class="input-wrap">
        <i class="fa-solid fa-lock input-icon"></i>
        <input type="password" id="tl-password" class="form-input" placeholder="••••••••" required autocomplete="current-password">
        <button type="button" class="pw-toggle" onclick="togglePw()"><i class="fa-regular fa-eye" id="pw-eye"></i></button>
      </div>
    </div>

    <div class="login-error" id="tl-error"></div>

    <button type="submit" class="login-btn" id="tl-btn">
      <i class="fa-solid fa-right-to-bracket"></i> Anmelden
    </button>
  </form>

  <div class="login-footer">
    <a href="../index.html">← Zur Website</a>
  </div>
</div>

<div class="toast-container" id="toast-container"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../supabase.js"></script>
<script src="../js/auth.js"></script>
<script>
document.addEventListener('DOMContentLoaded', async () => {
  const { data: { user } } = await sb.auth.getUser();
  if (user) {
    const p = await Auth.getProfile(user.id);
    if (p && ['team','admin'].includes(p.role)) {
      window.location.href = 'dashboard.html'; return;
    }
  }
});

function togglePw() {
  const input = document.getElementById('tl-password');
  const icon  = document.getElementById('pw-eye');
  if (input.type === 'password') {
    input.type = 'text';
    icon.className = 'fa-regular fa-eye-slash';
  } else {
    input.type = 'password';
    icon.className = 'fa-regular fa-eye';
  }
}

document.getElementById('login-form').addEventListener('submit', async function(e) {
  e.preventDefault();
  const btn   = document.getElementById('tl-btn');
  const errEl = document.getElementById('tl-error');
  const email    = document.getElementById('tl-email').value.trim();
  const password = document.getElementById('tl-password').value;

  errEl.className = 'login-error';

  btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Laden…';
  btn.disabled = true;

  const res = await Auth.login(email, password);
  if (!res.ok) {
    errEl.textContent = res.msg;
    errEl.className = 'login-error show';
    btn.innerHTML = '<i class="fa-solid fa-right-to-bracket"></i> Anmelden';
    btn.disabled = false;
    return;
  }

  const profile = await Auth.getProfile(res.user.id);
  if (!profile || !['team','admin'].includes(profile.role)) {
    await sb.auth.signOut();
    errEl.textContent = 'Kein Zugriff. Nur für Team-Mitglieder.';
    errEl.className = 'login-error show';
    btn.innerHTML = '<i class="fa-solid fa-right-to-bracket"></i> Anmelden';
    btn.disabled = false;
    return;
  }

  // Success toast
  const t = document.createElement('div');
  t.className = 'toast success';
  t.innerHTML = `<i class="fa-solid fa-circle-check"></i><span>Willkommen, ${profile.vorname}! 👋</span>`;
  document.getElementById('toast-container').appendChild(t);

  setTimeout(() => { window.location.href = 'dashboard.html'; }, 900);
});
</script>
</body>
</html>
