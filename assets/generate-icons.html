<!DOCTYPE html>
<html>
<head><title>Proreinigung Icon Generator</title></head>
<body style="font-family:sans-serif;padding:20px">
<h2>Proreinigung App Icons werden erstellt…</h2>
<canvas id="c" style="display:none"></canvas>
<script>
function drawIcon(size) {
  const c = document.getElementById('c');
  c.width = size; c.height = size;
  const ctx = c.getContext('2d');

  // Background
  const grad = ctx.createLinearGradient(0,0,size,size);
  grad.addColorStop(0,'#0A0E1A');
  grad.addColorStop(1,'#1565C0');
  ctx.fillStyle = grad;
  const r = size * 0.2;
  ctx.beginPath();
  ctx.moveTo(r,0); ctx.lineTo(size-r,0);
  ctx.quadraticCurveTo(size,0,size,r);
  ctx.lineTo(size,size-r);
  ctx.quadraticCurveTo(size,size,size-r,size);
  ctx.lineTo(r,size); ctx.quadraticCurveTo(0,size,0,size-r);
  ctx.lineTo(0,r); ctx.quadraticCurveTo(0,0,r,0);
  ctx.closePath(); ctx.fill();

  // Glow
  const glow = ctx.createRadialGradient(size/2,size/2,0,size/2,size/2,size*0.4);
  glow.addColorStop(0,'rgba(0,188,212,0.3)'); glow.addColorStop(1,'rgba(0,188,212,0)');
  ctx.fillStyle = glow; ctx.fillRect(0,0,size,size);

  // Letter P
  ctx.font = `bold ${size*0.55}px system-ui,sans-serif`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillStyle = '#fff';
  ctx.fillText('P', size/2, size/2 + size*0.03);

  // Bottom accent line
  const line = ctx.createLinearGradient(size*0.2, size*0.85, size*0.8, size*0.85);
  line.addColorStop(0,'#00BCD4'); line.addColorStop(1,'#1565C0');
  ctx.strokeStyle = line;
  ctx.lineWidth = size * 0.05;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(size*0.25, size*0.82);
  ctx.lineTo(size*0.75, size*0.82);
  ctx.stroke();

  return c.toDataURL('image/png');
}

function download(dataUrl, filename) {
  const a = document.createElement('a');
  a.href = dataUrl; a.download = filename; a.click();
}

setTimeout(() => {
  download(drawIcon(192), 'icon-192.png');
  setTimeout(() => {
    download(drawIcon(512), 'icon-512.png');
    document.body.innerHTML += '<p style="color:green;font-size:16px">✅ Fertig! Verschiebe icon-192.png und icon-512.png in den Ordner <b>assets/images/</b></p>';
  }, 600);
}, 300);
</script>
</body>
</html>
